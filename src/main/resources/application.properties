spring.application.name=EcommerceProjectBackend
server.port=8088
server.servlet.context-path=/api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ecommerce_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}


spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:50}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:10}
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

jwt.signerKey=${JWT_SIGNER_KEY}
jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}


spring.security.oauth2.client.registration.google.client-id=${OUTBOUND_IDENTITY_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${OUTBOUND_IDENTITY_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-name=Google


OUTBOUND_IDENTITY_REDIRECT_URI=${OUTBOUND_IDENTITY_REDIRECT_URI:https://theology-spelling-entertaining-absorption.trycloudflare.com/authenticate}

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.smtp.debug=true

app.mail.from=taivs0903@gmail.com
app.mail.from-name=Social Media
app.email.verification.expiration-hours=${EMAIL_VERIFICATION_EXPIRATION_HOURS:24}
app.email.verification.base-url=${APP_BASE_URL:https://performer-electro-flexible-tune.trycloudflare.com/api}
app.email.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}

brevo.api-key=${BREVO_API_KEY}

imagekit.public-key=${PUBLIC_KEY_IMAGE_KIT}
imagekit.private-key=${PRIVATE_KEY_IMAGE_KIT}
imagekit.url-endpoint=${IMAGE_KIT_URL_ENDPOINT}

ghn.api-url=${GHN_API_URL}
ghn.token=${GHN_TOKEN}
ghn.shop-id=${GHN_SHOP_ID}

vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}
vnpay.paymentUrl=${VNPAY_PAYMENT_URL}
vnpay.returnUrl=${VNPAY_RETURN_URL:https://theology-spelling-entertaining-absorption.trycloudflare.com/payment/callback}
vnpay.apiUrl=${VNPAY_API_URL}
vnpay.ipnUrl=${VNPAY_IPN_URL:https://performer-electro-flexible-tune.trycloudflare.com/api/payment/callback/VNPAY}

paypal.clientId=${PAYPAL_CLIENT_ID}
paypal.clientSecret=${PAYPAL_CLIENT_SECRET}
paypal.mode=${PAYPAL_MODE:sandbox}
paypal.returnUrl=${PAYPAL_RETURN_URL:https://theology-spelling-entertaining-absorption.trycloudflare.com/payment/callback}
paypal.cancelUrl=${PAYPAL_CANCEL_URL:https://theology-spelling-entertaining-absorption.trycloudflare.com/payment/callback}

momo.partnerCode=${MOMO_PARTNER_CODE}
momo.accessKey=${MOMO_ACCESS_KEY}
momo.secretKey=${MOMO_SECRET_KEY}
momo.paymentUrl=${MOMO_PAYMENT_URL}
momo.returnUrl=${MOMO_RETURN_URL:https://theology-spelling-entertaining-absorption.trycloudflare.com/payment/callback}
momo.notifyUrl=${MOMO_NOTIFY_URL:https://performer-electro-flexible-tune.trycloudflare.com/api/payment/callback/MOMO}

spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.username=${ELASTICSEARCH_USERNAME:}
spring.elasticsearch.password=${ELASTICSEARCH_PASSWORD:}

# Logging — controlled by env, defaults to production-safe levels
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:WARN}
logging.level.com.taivs.EcommerceWeb=${LOG_LEVEL_APP:INFO}
logging.level.com.zaxxer.hikari=${LOG_LEVEL_HIKARI:WARN}

# Slow query detection (Hibernate)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=${SLOW_QUERY_MS:200}

# Server compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# Async / thread pool
spring.task.execution.pool.core-size=${ASYNC_CORE_POOL:4}
spring.task.execution.pool.max-size=${ASYNC_MAX_POOL:8}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE_CAPACITY:500}
spring.task.execution.thread-name-prefix=async-

# Actuator — expose health + Prometheus metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.endpoints.web.base-path=/actuator
management.endpoint.prometheus.enabled=true
# Tag every metric with the app name (visible in Grafana)
management.metrics.tags.application=${spring.application.name:ecommerceweb}

# Rate limiting
app.rate-limit.enabled=${RATE_LIMIT_ENABLED:true}

# CORS allowed origins (comma-separated origin patterns)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://theology-spelling-entertaining-absorption.trycloudflare.com,http://localhost:*}

# Flyway — disabled (using JPA ddl-auto=none, manual migrations)
spring.flyway.enabled=false

